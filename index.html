<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, bijo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: #111111; /* Sleek dark background */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            align-items: center;
            overflow: hidden;
        }

        /* Static Elegant Header spanning full mobile width */
        #birthday-header {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; /* Gives it that beautiful, subtle old handwritten calligraphic feel */
            font-weight: 500;
            font-size: 9.5vw; /* Scales beautifully across the entire width of mobile screens */
            text-align: center;
            width: 100%;
            padding: 20px 10px;
            color: #ffffff; /* Plain white elegant text, no color effects */
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Desktop optimization cap so text stays proportioned on larger screens */
        @media (min-width: 600px) {
            #birthday-header {
                font-size: 4rem;
            }
        }

        /* Fullscreen Width Image Container */
        .image-container {
            position: relative;
            flex: 1;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        .birthday-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Beautiful fullscreen crop covering full mobile width */
        }

        /* Opaque Rectangle Window with slightly rounded corners */
        .overlay-box {
            position: absolute;
            background: rgba(0, 0, 0, 0.7); /* Slightly opaque black window */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            border-radius: 6px; /* Rectangle window with slight rounded corners */
            color: #ffffff;
            font-family: sans-serif; /* Clean font for absolute button readability */
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            pointer-events: none; /* Let clicks pass directly into image container underneath */
        }
    </style>
</head>
<body>

    <h1 id="birthday-header">Happy Birthday, bijo</h1>

    <div class="image-container" id="click-zone">
        <img src="image.jpeg" alt="Birthday Image" class="birthday-image">
        <div class="overlay-box" id="overlay-text">Click to Play</div>
    </div>

    <audio id="bday-audio" src="audio.m4a" loop></audio>

    <script>
        const clickZone = document.getElementById('click-zone');
        const audio = document.getElementById('bday-audio');
        const overlayText = document.getElementById('overlay-text');

        clickZone.addEventListener('click', () => {
            // Permanently deletes the button element instantly on the very first click
            if (document.getElementById('overlay-text')) {
                overlayText.remove();
            }

            // Standard Play/Pause toggle logic
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log("Playback interaction error:", err);
                });
            } else {
                audio.pause();
            }
        });
    </script>
</body>
</html>
