<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, bijo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Playfair Display', serif;
            background-color: #111111; /* Sleek dark background */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            align-items: center;
            overflow: hidden;
        }

        /* Static Elegant Header spanning full mobile width */
        #birthday-header {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 8.5vw; /* Scales perfectly to cover mobile screen width */
            text-align: center;
            width: 100%;
            padding: 20px 10px;
            color: #ffffff; /* Just plain text, no color effects */
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Responsive cap for desktop viewports so it doesn't get excessively huge */
        @media (min-width: 600px) {
            #birthday-header {
                font-size: 3.5rem;
            }
        }

        /* Fullscreen Width Image Container */
        .image-container {
            position: relative;
            flex: 1;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        .birthday-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image fills the frame beautifully */
        }

        /* Opaque Rectangle Window with slightly rounded corners */
        .overlay-box {
            position: absolute;
            background: rgba(0, 0, 0, 0.65); /* Opaque window effect */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            border-radius: 6px; /* Rectangle with slightly rounded corners instead of a pill */
            color: #ffffff;
            font-family: sans-serif; /* Clean secondary font for button text clarity */
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none; /* Allows clicks to pass through to the image container */
            transition: opacity 0.2s ease;
        }

        /* Utility class to hide the button when audio is playing */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <h1 id="birthday-header">Happy Birthday, bijo</h1>

    <div class="image-container" id="click-zone">
        <img src="image.jpeg" alt="Birthday Image" class="birthday-image">
        <div class="overlay-box" id="overlay-text">Click to Play</div>
    </div>

    <audio id="bday-audio" src="audio.m4a" loop></audio>

    <script>
        const clickZone = document.getElementById('click-zone');
        const audio = document.getElementById('bday-audio');
        const overlayText = document.getElementById('overlay-text');

        clickZone.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(err => {
                    console.log("Playback interaction error:", err);
                });
                overlayText.classList.add('hidden'); // Window disappears completely when playing
            } else {
                audio.pause();
                overlayText.classList.remove('hidden'); // Window reappears if paused again
            }
        });
    </script>
</body>
</html>
